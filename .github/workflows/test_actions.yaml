on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Run tests
      run: |  
        python -m unittest discover -s . -p "test_*.py"
        coverage run -m unittest discover -s . -p "test_*.py"
